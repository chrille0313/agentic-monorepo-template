# Dependabot keeps two things fresh:
#   1. GitHub Actions: updates the SHA-pinned `uses:` lines (and their version
#      comments), so pinning stays secure without going stale.
#   2. npm: the repo's own toolchain (commitlint) lives in package.json from
#      day one. /setup-stack extends this file when the chosen stack adds a
#      new package ecosystem (cargo, pip, uv, gomod, maven, ...).
#
# Updates are grouped to cut PR noise and keep related packages moving
# together; lone bumps within a framework family are a common way to break
# the build. The 7-day cooldown avoids adopting fresh releases, since
# compromised versions are usually yanked within days of publication.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # This prefix style (prefix + include: scope) mirrors a config observed to
    # produce lowercase "bump" subjects. Casing is ultimately decided by
    # Dependabot's own heuristics, so commitlint also exempts Dependabot
    # commits regardless (commitlint.config.mjs).
    commit-message:
      prefix: ci
      include: scope
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
