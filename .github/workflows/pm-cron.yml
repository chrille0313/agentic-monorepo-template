# Outer loop, autonomous: on a schedule, the PM agent triages the backlog,
# picks ONE ready issue, refreshes its spec, and labels it `agent`, which
# triggers agent-task.yml. Humans still hold the merge gate.
#
# Disabled by default: uncomment the `schedule` block to enable. Requires the
# same setup as agent-task.yml.
name: PM triage

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: '0 8 * * 1-5' # weekday mornings UTC

permissions:
  contents: read
  issues: write

jobs:
  pm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          # Set one of these secrets; the subscription token is preferred.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the /pm skill with --dispatch.
          claude_args: '--max-turns 50'
