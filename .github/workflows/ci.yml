# The deterministic gate: the same command contract agents verify with locally,
# enforced on every PR by machinery that cannot be talked past. Agent review
# layers on top of this; it never substitutes for it.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Wired by /setup-stack, one step per command-contract entry. Pin any new
      # action to a full commit SHA; the security scan blocks mutable tags. E.g.:
      # - uses: actions/setup-node@<commit-sha> # v4
      #   with: { node-version: 24 }
      # - run: npm ci
      # - run: <check command>
      # - run: <test command>
      # - run: <build command>
      - name: Contract not wired yet
        run: echo "Run /setup-stack to wire the command contract into this job."

  # Conventional commits, enforced (CLAUDE.md states the rule; this checks it).
  # Applies to agents and humans alike.
  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          configFile: commitlint.config.mjs

  # Lint the workflows themselves; until a stack exists they are most of the
  # code in this repo, and agents edit them.
  workflows-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2

  # Unit tests are a floor, not a verdict: a large share of functionally-correct
  # AI-generated code still introduces security vulnerabilities. Scan independently.
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: semgrep scan --config auto --error
